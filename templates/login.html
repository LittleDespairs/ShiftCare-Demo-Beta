<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121820">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Login - {{ app_name }}</title>
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="icon" href="/static/icons/app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/style.css?v={{ app_version }}-operations-ui">
    <link rel="stylesheet" href="/static/css/auth.css?v={{ app_version }}-portal-entry-operations-ui">
</head>

<body class="app-shell ltr auth-page{% if cloud_employee_portal_mode() %} auth-employee-portal-page{% endif %}" data-app-version="{{ app_version }}" data-app-name="{{ app_name }}" data-demo-mode="{{ '1' if demo_mode_enabled() else '0' }}">
    <div class="auth-topbar">
        <div class="lang-switcher" aria-label="Language">
            <button class="lang-btn" type="button" data-lang="he" data-i18n="lang_he">עברית</button>
            <button class="lang-btn" type="button" data-lang="en" data-i18n="lang_en">English</button>
            <button class="lang-btn" type="button" data-lang="ru" data-i18n="lang_ru">Русский</button>
        </div>
    </div>

    <main class="auth-layout">
        <section class="auth-panel" aria-labelledby="auth-title">
            <div class="auth-brand">
                <div class="brand-logo">SC</div>
                <div>
                    <h1 id="auth-title">{{ app_name }}</h1>
                    <p>Local scheduling workspace</p>
                </div>
            </div>

            {% if cloud_employee_portal_mode() %}
            <div class="auth-portal-entry">
                <div class="auth-portal-copy">
                    <div class="auth-portal-kicker" data-i18n="auth_employee_portal">Employee portal</div>
                    <h2 data-i18n="auth_employee_login">Employee login</h2>
                    <p data-i18n="auth_employee_login_action_text">Open weekly wishes and read-only schedule</p>
                </div>
                <button id="open-login-modal" class="auth-portal-button" type="button">
                    <span class="auth-portal-button-icon">SC</span>
                    <span class="auth-portal-button-body">
                        <strong class="auth-portal-button-title">Employee login</strong>
                        <em class="auth-portal-button-text">Open weekly wishes and read-only schedule</em>
                    </span>
                </button>
            </div>

            <div class="auth-portal-feature-row" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
            {% else %}
            <div class="auth-choice-grid" aria-label="Start action">
                <button id="open-login-modal" class="auth-choice-card" type="button">
                    <strong>Authorize user</strong>
                    <span>Load organization data to this computer</span>
                </button>
                <button id="open-organization-modal" class="auth-choice-card" type="button">
                    <strong>Add organization</strong>
                    <span>Create a cloud organization and start locally</span>
                </button>
            </div>
            {% endif %}

            <div id="auth-message" class="auth-message" role="status" aria-live="polite"></div>
            <div id="current-session" class="auth-session"></div>
        </section>
    </main>

    <div id="login-modal" class="app-modal-overlay" aria-hidden="true">
        <div class="app-modal auth-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
            <div class="app-modal-header">
                <h2 id="login-modal-title" class="app-modal-title">Authorize user</h2>
                <button class="app-modal-close" type="button" data-auth-modal-close aria-label="Close">×</button>
            </div>
            <div class="app-modal-body">
                <form id="login-form" class="auth-form" data-auth-form="login">
                    <div class="auth-tabs auth-login-methods" role="tablist" aria-label="Login method">
                        <button id="login-method-email" class="auth-tab active" type="button" data-login-method="email" aria-pressed="true">
                            Email
                        </button>
                        <button id="login-method-id-card" class="auth-tab" type="button" data-login-method="id_card" aria-pressed="false">
                            ID card
                        </button>
                    </div>

                    <label class="form-field">
                        <span id="login-identifier-label">Email</span>
                        <input id="login-email" type="text" autocomplete="username" required>
                    </label>

                    <label class="form-field">
                        <span>Password</span>
                        <input id="login-password" type="password" autocomplete="current-password" required>
                    </label>

                    <button class="btn btn-primary auth-submit" type="submit">Login</button>
                </form>
            </div>
        </div>
    </div>

    {% if not cloud_employee_portal_mode() %}
    <div id="organization-modal" class="app-modal-overlay" aria-hidden="true">
        <div class="app-modal auth-modal" role="dialog" aria-modal="true" aria-labelledby="organization-modal-title">
            <div class="app-modal-header">
                <h2 id="organization-modal-title" class="app-modal-title">Add organization</h2>
                <button class="app-modal-close" type="button" data-auth-modal-close aria-label="Close">×</button>
            </div>
            <div class="app-modal-body">
                <form id="bootstrap-form" class="auth-form" data-auth-form="bootstrap">
                    <label class="form-field">
                        <span>Organization name</span>
                        <input id="bootstrap-organization" type="text" autocomplete="organization" required minlength="2">
                    </label>

                    <label class="form-field">
                        <span>Your name</span>
                        <input id="bootstrap-name" type="text" autocomplete="name" required minlength="2">
                    </label>

                    <label class="form-field">
                        <span>Email</span>
                        <input id="bootstrap-email" type="email" autocomplete="email" required>
                    </label>

                    <label class="form-field">
                        <span data-i18n="auth_initial_role">Your role</span>
                        <select id="bootstrap-role" disabled>
                            <option value="owner" data-i18n="org_role_owner">Owner</option>
                        </select>
                        <small class="field-hint" data-i18n="auth_initial_role_hint">The first account is always the organization owner.</small>
                    </label>

                    <label class="form-field">
                        <span>Password</span>
                        <input id="bootstrap-password" type="password" autocomplete="new-password" required minlength="8">
                    </label>

                    <button class="btn btn-primary auth-submit" type="submit">Create organization</button>
                </form>
            </div>
        </div>
    </div>
    {% endif %}

    <script src="/static/js/i18n.js?v={{ app_version }}-auth-i18n-fix"></script>
    <script src="/static/js/auth_client.js?v={{ app_version }}-desktop-local"></script>
    <script src="/static/js/auth_i18n.js?v={{ app_version }}-role-management-refresh"></script>
    <script src="/static/js/auth.js?v={{ app_version }}-portal-entry"></script>
    <script src="/static/js/online_status.js?v={{ app_version }}"></script>
</body>

</html>
