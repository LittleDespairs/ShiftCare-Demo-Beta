<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121820">
    <title>Support - {{ app_name }}</title>
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="icon" href="/static/icons/app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/style.css?v={{ app_version }}-feedback">
    <link rel="stylesheet" href="/static/css/auth.css?v={{ app_version }}-feedback">
</head>

<body class="app-shell ltr" data-app-name="{{ app_name }}" data-demo-mode="{{ '1' if demo_mode_enabled() else '0' }}">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo">SC</div>
                <div class="brand-text">
                    <h1 class="brand-title">{{ app_name }}</h1>
                    <p class="brand-subtitle">Support</p>
                </div>
            </div>
            <nav class="nav-list">
                <a href="/" class="nav-item">
                    <span class="nav-icon" aria-hidden="true">⌂</span>
                    <span class="nav-label" data-i18n="nav_dashboard">Dashboard</span>
                </a>
                <a href="/schedule" class="nav-item">
                    <span class="nav-icon" aria-hidden="true">🗓</span>
                    <span class="nav-label" data-i18n="nav_schedule">Schedule</span>
                </a>
                <a href="/weekly-preferences" class="nav-item">
                    <span class="nav-icon" aria-hidden="true">✦</span>
                    <span class="nav-label" data-i18n="nav_requests">Preferences</span>
                </a>
                <a href="/organization" class="nav-item">
                    <span class="nav-icon" aria-hidden="true">◎</span>
                    <span class="nav-label" data-i18n="nav_organization">Personal account</span>
                </a>
                <a href="/feedback" class="nav-item active">
                    <span class="nav-icon" aria-hidden="true">?</span>
                    <span class="nav-label" data-i18n="nav_feedback">Support</span>
                </a>
            </nav>
        </aside>

        <main class="main-area">
            <header class="topbar">
                <div class="page-heading">
                    <h2 class="page-title">Support</h2>
                    <p class="page-subtitle">Report an issue or request a product change.</p>
                </div>
                <div class="topbar-actions"></div>
            </header>

            <section class="organization-grid">
                <form id="feedback-form" class="organization-panel organization-panel-wide">
                    <div class="settings-section-header">
                        <div>
                            <h3 class="settings-section-title">New report</h3>
                            <p class="settings-section-text">Reports are sent to the ShiftCare support inbox with app diagnostics.</p>
                        </div>
                    </div>

                    <div class="feedback-form-grid">
                        <label class="form-field">
                            Type
                            <select id="feedback-type" class="input" required>
                                <option value="bug">Bug report</option>
                                <option value="feature_request">Feature request</option>
                            </select>
                        </label>

                        <label class="form-field">
                            Severity
                            <select id="feedback-severity" class="input" required>
                                <option value="minor">Minor</option>
                                <option value="major">Major</option>
                                <option value="blocking">Blocking</option>
                            </select>
                        </label>

                        <label class="form-field">
                            Area
                            <select id="feedback-area" class="input" required>
                                <option value="general">General</option>
                                <option value="schedule">Schedule</option>
                                <option value="employees">Employees</option>
                                <option value="preferences">Preferences</option>
                                <option value="auth">Login and accounts</option>
                                <option value="settings">Settings</option>
                                <option value="updates">Updates</option>
                                <option value="license">License</option>
                                <option value="cloud_sync">Cloud sync</option>
                                <option value="other">Other</option>
                            </select>
                        </label>

                        <label class="form-field">
                            Contact email
                            <input id="feedback-contact" type="email" autocomplete="email">
                        </label>

                        <label class="form-field feedback-span">
                            Title
                            <input id="feedback-title" type="text" maxlength="160" required>
                        </label>

                        <label class="form-field feedback-span">
                            Description
                            <textarea id="feedback-description" rows="5" maxlength="4000" required></textarea>
                        </label>

                        <label class="form-field feedback-bug-field">
                            Steps to reproduce
                            <textarea id="feedback-steps" rows="4" maxlength="2000"></textarea>
                        </label>

                        <label class="form-field feedback-bug-field">
                            Actual result
                            <textarea id="feedback-actual" rows="4" maxlength="2000"></textarea>
                        </label>

                        <label class="form-field feedback-bug-field">
                            Expected result
                            <textarea id="feedback-expected" rows="4" maxlength="2000"></textarea>
                        </label>
                    </div>

                    <div class="settings-actions">
                        <button id="feedback-submit" class="btn btn-primary" type="submit">Submit report</button>
                    </div>
                </form>
            </section>

            <div id="feedback-message" class="organization-message" role="status" aria-live="polite"></div>
        </main>
    </div>

<script src="/static/js/i18n.js?v={{ app_version }}-feedback"></script>
<script src="/static/js/auth_client.js?v={{ app_version }}-feedback"></script>
<script src="/static/js/access_control.js?v={{ app_version }}-feedback"></script>
<script src="/static/js/pwa.js?v={{ app_version }}"></script>
<script src="/static/js/update_notifier.js?v={{ app_version }}-startup-updates"></script>
<script src="/static/js/feedback.js?v={{ app_version }}-feedback"></script>
<script src="/static/js/online_status.js?v={{ app_version }}"></script>
</body>

</html>
