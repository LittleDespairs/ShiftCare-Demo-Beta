<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Reset Password - {{ app_name }}</title>
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="icon" href="/static/icons/app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/style.css?v={{ app_version }}">
    <link rel="stylesheet" href="/static/css/auth.css?v={{ app_version }}">
</head>

<body class="app-shell ltr auth-page" data-app-version="{{ app_version }}" data-app-name="{{ app_name }}" data-demo-mode="{{ '1' if demo_mode_enabled() else '0' }}">
    <main class="auth-layout">
        <section class="auth-panel" aria-labelledby="reset-title">
            <div class="auth-brand">
                <div class="brand-logo">SC</div>
                <div>
                    <h1 id="reset-title">Reset password</h1>
                    <p>Choose a new account password</p>
                </div>
            </div>

            <form id="reset-password-form" class="auth-form">
                <label id="reset-token-field" class="form-field">
                    <span>Reset token</span>
                    <textarea id="reset-token" rows="3" required></textarea>
                </label>

                <label class="form-field">
                    <span>New password</span>
                    <input id="reset-password" type="password" autocomplete="new-password" required minlength="8">
                </label>

                <label class="form-field">
                    <span>Confirm password</span>
                    <input id="reset-confirm-password" type="password" autocomplete="new-password" required minlength="8">
                </label>

                <button class="btn btn-primary auth-submit" type="submit">Reset password</button>
            </form>

            <div id="reset-message" class="auth-message" role="status" aria-live="polite"></div>
        </section>
    </main>

    <script src="/static/js/reset_password.js?v={{ app_version }}"></script>
    <script src="/static/js/online_status.js?v={{ app_version }}"></script>
</body>

</html>
