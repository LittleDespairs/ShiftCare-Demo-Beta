name: Tests

on:
  push:
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: schedule_test
          POSTGRES_USER: schedule_app
          POSTGRES_PASSWORD: schedule_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schedule_app -d schedule_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SCHEDULE_APP_POSTGRES_TEST_DSN: postgresql://schedule_app:schedule_app@localhost:5432/schedule_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-cloud.txt httpx

      - name: Run regression suite
        run: python -m unittest discover -s tests -v

      - name: Compile Python modules
        run: python -m compileall -q .
