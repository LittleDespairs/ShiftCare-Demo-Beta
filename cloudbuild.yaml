substitutions:
  _REGION: me-west1
  _SERVICE: schedule-app-beta-api
  _REPOSITORY: schedule-app
  _IMAGE: schedule-app-api
  _TAG: manual
  _PUBLIC_APP_BASE_URL: https://portal.shiftcare.co.il
  _CLOUD_SQL_CONNECTION_NAME: schedule-app-beta:me-west1:schedule-beta-db
  _DATABASE_NAME: schedule_beta
  _DATABASE_USER: schedule_app

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --min-instances
      - '1'
      - --max-instances
      - '20'
      - --concurrency
      - '200'
      - --cpu
      - '1'
      - --memory
      - 512Mi
      - --set-env-vars
      - APP_ENV=staging,DATABASE_ENGINE=postgresql,DATABASE_NAME=${_DATABASE_NAME},DATABASE_USER=${_DATABASE_USER},CLOUD_SQL_CONNECTION_NAME=${_CLOUD_SQL_CONNECTION_NAME},DATABASE_SSL_MODE=require,PUBLIC_APP_BASE_URL=${_PUBLIC_APP_BASE_URL},SCHEDULE_APP_DEFAULT_API_BASE_URL=${_PUBLIC_APP_BASE_URL}
      - --set-secrets
      - DATABASE_PASSWORD=schedule-app-db-password:latest,AUTH_TOKEN_SECRET=schedule-app-auth-token-secret:latest
      - --set-cloudsql-instances
      - ${_CLOUD_SQL_CONNECTION_NAME}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
